    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.injectCommonUI) {
                window.injectCommonUI();
            }
            var TM_MT_LABELS = { WHOLESALE: '批发', FOREIGN_TRADE: '外贸', ECOM: '电商', FACTORY_TRADE: '工贸' };
            function tmUpdateMerchantSummary() {
                var el = document.querySelector('#registerForm input[name="tmMerchantType"]:checked');
                var code = el ? el.value : 'WHOLESALE';
                var zh = TM_MT_LABELS[code] || code;
                var sum = document.getElementById('tm-register-merchant-summary');
                if (sum) {
                    sum.textContent = '当前选择：' + zh + '商户（' + code + '）';
                }
                document.documentElement.setAttribute('data-merchant-type', code);
                try {
                    sessionStorage.setItem('tm_merchant_intent', code);
                } catch (e) { /* ignore */ }
            }
            document.querySelectorAll('#registerForm input[name="tmMerchantType"]').forEach(function(r) {
                r.addEventListener('change', tmUpdateMerchantSummary);
            });
            var initial = typeof window.tmResolveMerchantIntent === 'function' ? window.tmResolveMerchantIntent() : 'WHOLESALE';
            var radio = document.querySelector('#registerForm input[name="tmMerchantType"][value="' + initial + '"]');
            if (radio) {
                radio.checked = true;
            } else {
                var fb = document.querySelector('#registerForm input[name="tmMerchantType"][value="WHOLESALE"]');
                if (fb) fb.checked = true;
            }
            tmUpdateMerchantSummary();
            try {
                var params = new URLSearchParams(window.location.search);
                var ref = params.get('ref');
                if (ref) {
                    var ic = document.getElementById('inviteCode');
                    if (ic) ic.value = ref.trim();
                }
                if (!params.get('merchantType') && ref) {
                    var gw = typeof getApiUrl === 'function' ? getApiUrl('gateway') : '';
                    if (gw && window.wrappedFetch) {
                        window.wrappedFetch(gw + '/api/v1/tenant/referral/validate', {
                            skipAuth: true,
                            method: 'POST',
                            body: JSON.stringify({ code: ref.trim() })
                        }).then(function (r) { return r.json(); }).then(function (v) {
                            if (v && v.valid && v.referrerMerchantType) {
                                var r2 = document.querySelector('#registerForm input[name="tmMerchantType"][value="' + v.referrerMerchantType + '"]');
                                if (r2) { r2.checked = true; tmUpdateMerchantSummary(); }
                            }
                        }).catch(function () { /* ignore */ });
                    }
                }
            } catch (eRef) { /* ignore */ }
        });
    </script>
