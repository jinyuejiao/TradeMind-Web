<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="../../assets/js/env-config.js"></script>
    <script src="../../assets/js/api-client.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        (function () {
            try {
                var isEmbedded = (window.self !== window.top) || (new URLSearchParams(location.search).get('embed') === '1');
                if (isEmbedded) {
                    document.documentElement.classList.add('tm-embedded');
                }
            } catch (e) { /* ignore */ }
        })();
    </script>
    <style>
        html.tm-embedded aside,
        html.tm-embedded header,
        html.tm-embedded .tm-compliance-footer {
            display: none !important;
        }
        html.tm-embedded #content-area { padding-bottom: 0 !important; }
    </style>
    <title>TradeMind 商贸智脑 - 供应商管理</title>
    <link rel="icon" href="../../favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="../../favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../CSS/common.css">
    <script src="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@latest"></script>
    <script src="../../assets/js/auth.js?v=20260422r13"></script>
    <script src="../../assets/js/ui-supplier.js?v=20260422r16"></script>
    <style>
        body { display: flex; height: 100vh; overflow: hidden; }
        .view-toggle-btn { transition: all 0.2s ease; }
        .view-toggle-btn.active {
            background-color: #14B8A6 !important;
            color: #fff !important;
            box-shadow: 0 4px 12px rgba(20, 184, 166, 0.25);
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-600 font-sans h-screen w-full flex overflow-hidden">
    <aside class="hidden md:flex w-64 bg-slate-900 border-r border-slate-800 flex-shrink-0 flex-col z-20 shadow-xl" id="main-sidebar">
        <div class="h-16 flex items-center px-6 border-b border-slate-800">
            <div class="w-10 h-10 bg-[#14B8A6] rounded-xl flex items-center justify-center mr-3 text-white shadow-lg shadow-[#14B8A6]/20">
                <i class="ph ph-brain text-xl"></i>
            </div>
            <span class="text-white text-lg font-bold tracking-wider">TradeMind</span>
        </div>
        <nav class="flex-1 py-6 px-3 space-y-1">
            <button onclick="switchTab('dashboard')" class="nav-btn w-full flex items-center px-3 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-all"><i class="ph ph-squares-four text-xl mr-3"></i><span class="text-sm font-medium">工作台</span></button>
            <button onclick="switchTab('biz')" class="nav-btn w-full flex items-center px-3 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-all"><i class="ph ph-chart-line-up text-xl mr-3"></i><span class="text-sm font-medium">智能经营</span></button>
            <button onclick="switchTab('crm')" class="nav-btn w-full flex items-center px-3 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-all"><i class="ph ph-users text-xl mr-3"></i><span class="text-sm font-medium">客户 CRM</span></button>
            <button onclick="switchTab('supply')" class="nav-btn w-full flex items-center px-3 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-all"><i class="ph ph-flask text-xl mr-3"></i><span class="text-sm font-medium">产品中心</span></button>
            <button onclick="switchTab('supplier')" class="nav-btn w-full flex items-center px-3 py-3 text-white bg-slate-800 rounded-lg transition-all active-nav border-l-4 border-[#14B8A6]"><i class="ph ph-warehouse text-xl mr-3"></i><span class="text-sm font-medium">供应商管理</span></button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 relative h-full">
        <header class="hidden md:flex h-14 md:h-16 bg-white/90 backdrop-blur border-b border-slate-200 items-center justify-between px-4 md:px-8 sticky top-0 z-30 flex-shrink-0">
            <div class="hidden md:flex items-center w-1/3 text-slate-400 group"><i class="ph ph-magnifying-glass text-lg group-focus-within:text-brand-600 transition"></i><input type="text" placeholder="搜索供应商、进货单..." class="bg-transparent border-none focus:outline-none text-slate-700 w-full ml-3 placeholder-slate-400 text-sm font-medium"></div>
            <div class="flex items-center space-x-3 md:space-x-5">
                <div class="hidden md:flex items-center px-3 py-1 bg-slate-100 border border-slate-200 rounded-full">
                    <span class="w-2 h-2 bg-brand-500 rounded-full mr-2 tech-pulse"></span>
                    <span class="text-xs font-bold text-slate-600 tracking-wide" id="page-title">供应商管理</span>
                </div>
            </div>
        </header>

        <div id="content-area" class="flex-1 overflow-y-auto bg-slate-50 no-scrollbar pb-24 md:pb-0">
            <div class="w-full p-4 md:p-8 space-y-6 fade-in">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div class="flex bg-white p-1 rounded-xl border border-slate-200 w-fit">
                        <button onclick="switchSupplierMainView('list')" id="supplier-tab-btn-list" class="view-toggle-btn active px-5 py-1.5 rounded-lg text-xs font-bold">进货单据明细</button>
                        <button onclick="switchSupplierMainView('supplier')" id="supplier-tab-btn-supplier" class="view-toggle-btn px-5 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-slate-600">供应商编辑</button>
                    </div>
                    <div id="sup-stat-chips" class="flex gap-3 overflow-x-auto no-scrollbar">
                        <div class="px-3 py-1.5 bg-white rounded-lg border border-slate-200 text-[10px] font-bold"><span class="text-slate-400 uppercase">本月进货:</span> <span class="text-slate-800 ml-1">实时统计</span></div>
                        <div class="px-3 py-1.5 bg-white rounded-lg border border-slate-200 text-[10px] font-bold"><span class="text-slate-400 uppercase">待处理:</span> <span class="text-orange-500 ml-1">动态计算</span></div>
                    </div>
                </div>

                <div id="supplier-tab-list" class="supplier-tab-content space-y-4">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">进货单据明细</h3>
                        <button onclick="openPurchaseModal()" class="bg-[#14B8A6] hover:bg-[#0D9488] text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 transition-colors">
                            <i class="ph ph-plus"></i> 新增进货单
                        </button>
                    </div>
                    <div id="orders-list" class="space-y-3"></div>
                </div>

                <div id="supplier-tab-supplier" class="supplier-tab-content hidden space-y-4">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">供应商管理</h3>
                        <button onclick="openSupplierModal()" class="bg-[#14B8A6] hover:bg-[#0D9488] text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 transition-colors">
                            <i class="ph ph-plus"></i> 新增供应商
                        </button>
                    </div>
                    <div id="suppliers-list" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="supplier-modal" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeSupplierModal()"></div>
        <div class="relative bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl fade-in text-left">
            <h3 class="font-bold text-slate-800 mb-6 flex items-center gap-2"><i class="ph ph-user-circle text-brand-500"></i><span id="supplier-modal-title">供应商编辑</span></h3>
            <div class="space-y-6">
                <div><label class="text-[9px] font-black text-slate-400 uppercase block mb-1">供应商名称</label><input type="text" id="supplier-name" class="form-input w-full" placeholder="请输入供应商名称"></div>
                <div><label class="text-[9px] font-black text-slate-400 uppercase block mb-1">联系人</label><input type="text" id="supplier-contact" class="form-input w-full" placeholder="请输入联系人姓名"></div>
                <div><label class="text-[9px] font-black text-slate-400 uppercase block mb-1">电话</label><input type="tel" id="supplier-phone" class="form-input w-full" placeholder="请输入联系电话"></div>
                <div><label class="text-[9px] font-black text-slate-400 uppercase block mb-1">评分(0-5)</label><input type="number" id="supplier-rating" class="form-input w-full" step="0.1" min="0" max="5" placeholder="4.5"></div>
                <div><label class="text-[9px] font-black text-slate-400 uppercase block mb-1">地址</label><textarea id="supplier-address" class="form-input w-full resize-none" rows="3" placeholder="请输入地址"></textarea></div>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeSupplierModal()" class="flex-1 py-3 rounded-xl border border-slate-200 text-xs font-bold text-slate-400 hover:bg-slate-50 transition-colors">取消</button>
                <button onclick="saveSupplier()" class="flex-1 py-3 rounded-xl bg-[#14B8A6] text-white text-xs font-bold shadow-lg hover:bg-[#0D9488] transition-colors">保存</button>
            </div>
        </div>
    </div>

    <div id="purchase-modal" class="hidden fixed inset-0 z-[120] flex items-center justify-center p-0 md:p-8">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closePurchaseModal()"></div>
        <div class="relative bg-white w-full max-w-5xl h-full max-h-[92vh] rounded-3xl shadow-2xl overflow-hidden flex flex-col fade-in modal-content-box text-left">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center shrink-0">
                <h2 class="text-sm font-black text-slate-800" id="purchase-modal-title">新增进货单</h2>
                <button onclick="closePurchaseModal()" class="p-2 hover:bg-slate-100 rounded-full transition-colors"><i class="ph ph-x text-xl text-slate-400"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 md:p-10 no-scrollbar space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                    <div class="md:col-span-5 space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">供应商</label>
                        <select id="purchase-supplier" class="form-input"><option value="">--- 请选择供应商 ---</option></select>
                    </div>
                    <div class="md:col-span-3 space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">进货状态</label>
                        <select id="purchase-status" class="form-input"><option value="">--- 请选择状态 ---</option></select>
                    </div>
                    <div class="md:col-span-4 space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">进货日期</label>
                        <input type="date" id="purchase-date" class="form-input">
                    </div>
                </div>

                <div class="space-y-4">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 flex justify-between">
                        <span>进货商品明细</span>
                        <button onclick="addPurchaseItem()" class="text-brand-600 hover:underline">+ 添加商品行</button>
                    </h3>
                    <div class="bg-slate-50 rounded-2xl border border-slate-100 overflow-hidden">
                        <table class="w-full text-xs" id="purchase-items-table">
                            <thead class="bg-slate-100/50 text-slate-400 font-bold uppercase tracking-tighter">
                                <tr>
                                    <th class="px-4 py-3 text-left">产品</th>
                                    <th class="px-4 py-3 text-center w-24">数量</th>
                                    <th class="px-4 py-3 text-center w-28">进货单价</th>
                                    <th class="px-4 py-3 text-center w-24">单位</th>
                                    <th class="px-4 py-3 text-center w-28">批次号</th>
                                    <th class="px-4 py-3 text-right">小计</th>
                                    <th class="px-4 py-3 text-center w-14">删除</th>
                                </tr>
                            </thead>
                            <tbody id="purchase-items-tbody" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>

                <div class="p-6 bg-slate-900 rounded-2xl text-white shadow-xl relative overflow-hidden flex justify-between items-center">
                    <div class="absolute -right-4 -top-4 opacity-5"><i class="ph ph-currency-dollar text-8xl"></i></div>
                    <div><p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">进货单总计</p><p class="text-[9px] text-slate-500 mt-1 italic">系统自动计算</p></div>
                    <div class="text-right"><span class="text-3xl font-black font-mono text-brand-500" id="purchase-grand-total">¥0.00</span></div>
                </div>
            </div>
            <div class="p-6 border-t border-slate-100 bg-white flex gap-4 shrink-0">
                <button onclick="closePurchaseModal()" class="flex-1 py-3 rounded-2xl border border-slate-200 text-xs font-bold text-slate-400">取消</button>
                <button onclick="savePurchase()" class="flex-[2] py-3 rounded-2xl bg-slate-900 text-white text-xs font-black shadow-xl active:scale-95 transition-all">保存进货单据</button>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            var tab = tabName || 'supplier';
            window.location.href = '/index-app.html#tab=' + encodeURIComponent(tab);
        }

        document.addEventListener('DOMContentLoaded', function() {
            var isEmbedded = false;
            try {
                isEmbedded = (window.self !== window.top) || (new URLSearchParams(location.search).get('embed') === '1');
            } catch (e) {
                isEmbedded = true;
            }
            if (!isEmbedded && window.injectCommonUI) {
                window.injectCommonUI();
            }
            if (window.SupplierModule && window.SupplierModule.init) {
                window.SupplierModule.init();
            }
            if (typeof window.switchSupplierMainView === 'function') {
                window.switchSupplierMainView('list');
            }
        });
    </script>
</body>
</html>
