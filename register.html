<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="./assets/js/env-config.js"></script>
    <script src="./assets/js/api-client.js?v=20260506r3"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>注册 — TradeMind 商贸智脑</title>
    <link rel="stylesheet" href="./assets/css/auth.css?v=20260619ui3">
    <link rel="stylesheet" href="./assets/css/phosphor-icons.css?v=20260619ui3">
</head>
<body class="auth-body auth-body--center auth-page-register">
    <main class="auth-main auth-main--register">
        <div class="auth-card auth-register-card">
            <header class="auth-card-header">
                <div class="auth-logo" aria-hidden="true">
                    <i class="ph-bold ph-brain"></i>
                </div>
                <h1 class="auth-title">TradeMind</h1>
                <p class="auth-subtitle auth-subtitle--stacked">
                    <span class="auth-subtitle-brand">商贸智脑</span>
                    <span class="auth-subtitle-company">杭州巨猿科技有限公司</span>
                </p>
            </header>
            <div class="auth-card-body auth-register-body">
                <form id="registerForm" class="auth-register-form" novalidate>
                    <input type="hidden" name="tmMerchantType" value="WHOLESALE" id="tmMerchantTypeHidden">

                    <div class="auth-field">
                        <label class="auth-label" for="regCompany">商户名称<span class="auth-required">*</span></label>
                        <div class="auth-input-wrap">
                            <i class="ph ph-storefront"></i>
                            <input class="auth-input" type="text" id="regCompany" name="company" maxlength="80" placeholder="请输入企业或店铺名称" autocomplete="organization" />
                        </div>
                    </div>

                    <div class="auth-field">
                        <label class="auth-label" for="regUsername">登录名<span class="auth-required">*</span></label>
                        <div class="auth-input-wrap">
                            <i class="ph ph-user"></i>
                            <input class="auth-input" type="text" id="regUsername" name="username" autocomplete="username" maxlength="64" placeholder="用于登录" />
                        </div>
                    </div>

                    <div class="auth-field">
                        <label class="auth-label" for="regPassword">登录密码<span class="auth-required">*</span></label>
                        <div class="auth-input-wrap">
                            <i class="ph ph-lock-key"></i>
                            <input class="auth-input" type="password" id="regPassword" name="password" autocomplete="new-password" minlength="6" maxlength="64" placeholder="至少 6 位" />
                            <button type="button" class="auth-toggle-pwd" onclick="tmRegisterTogglePwd('regPassword', this)" aria-label="显示密码">
                                <i class="ph ph-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="auth-field">
                        <label class="auth-label" for="regConfirmPassword">确认密码<span class="auth-required">*</span></label>
                        <div class="auth-input-wrap">
                            <i class="ph ph-lock-key"></i>
                            <input class="auth-input" type="password" id="regConfirmPassword" name="confirm_password" autocomplete="new-password" minlength="6" maxlength="64" placeholder="请再次输入密码" />
                            <button type="button" class="auth-toggle-pwd" onclick="tmRegisterTogglePwd('regConfirmPassword', this)" aria-label="显示密码">
                                <i class="ph ph-eye"></i>
                            </button>
                        </div>
                        <span id="passwordMatchIndicator" class="auth-hint" aria-live="polite"></span>
                    </div>

                    <div class="auth-field-divider" aria-hidden="true"></div>

                    <div class="auth-field">
                        <label class="auth-label" for="regPhone">手机号<span class="auth-required">*</span></label>
                        <div class="auth-input-row auth-input-row--phone">
                            <div class="auth-input-wrap auth-input-wrap--grow">
                                <i class="ph ph-phone"></i>
                                <input class="auth-input" type="tel" id="regPhone" name="phone" autocomplete="tel" inputmode="numeric" maxlength="11" placeholder="请输入手机号" />
                            </div>
                            <button type="button" id="sendCodeBtn" class="auth-btn-sms">发送验证码</button>
                        </div>
                    </div>

                    <div class="auth-field">
                        <label class="auth-label" for="regSmsCode">验证码<span class="auth-required">*</span></label>
                        <div class="auth-input-wrap">
                            <i class="ph ph-chat-circle-text"></i>
                            <input class="auth-input" type="text" id="regSmsCode" name="smsCode" inputmode="numeric" maxlength="8" autocomplete="one-time-code" placeholder="请输入短信验证码" />
                        </div>
                    </div>

                    <details class="auth-optional-block">
                        <summary class="auth-optional-summary">
                            <span>选填：邮箱、社会信用码、推荐码</span>
                        </summary>
                        <div class="auth-optional-inner">
                            <div class="auth-field auth-field--last">
                                <label class="auth-label" for="regEmail">邮箱<span class="auth-required">*</span></label>
                                <div class="auth-input-wrap">
                                    <i class="ph ph-envelope-simple"></i>
                                    <input class="auth-input" type="email" id="regEmail" name="email" autocomplete="email" placeholder="请输入邮箱" />
                                </div>
                            </div>
                            <div class="auth-field auth-field--last">
                                <label class="auth-label" for="regCreditCode">社会信用代码</label>
                                <div class="auth-input-wrap">
                                    <i class="ph ph-identification-card"></i>
                                    <input class="auth-input" type="text" id="regCreditCode" name="creditCode" maxlength="32" placeholder="选填" />
                                </div>
                            </div>
                            <div class="auth-field auth-field--last">
                                <label class="auth-label" for="inviteCode">推荐码</label>
                                <div class="auth-input-wrap">
                                    <i class="ph ph-gift"></i>
                                    <input class="auth-input" type="text" id="inviteCode" name="invite_code" maxlength="32" placeholder="选填" />
                                </div>
                            </div>
                        </div>
                    </details>

                    <div class="tm-legal-row">
                        <input type="checkbox" id="tmAgreeTerms" name="tmAgreeTerms" class="tm-legal-checkbox" aria-describedby="tm-legal-register-desc">
                        <label id="tm-legal-register-desc" for="tmAgreeTerms" class="auth-legal-label">
                            我已阅读并同意
                            <a href="#" class="tm-legal-link" data-tm-legal="service" id="show-service">《用户服务协议》</a>
                            与
                            <a href="#" class="tm-legal-link" data-tm-legal="privacy" id="show-privacy">《隐私协议》</a>
                        </label>
                    </div>

                    <button type="submit" id="registerSubmitBtn" class="auth-btn-primary tm-register-submit">完成注册</button>
                </form>

                <p class="auth-footer-links">
                    已有账号？<a class="auth-link" href="login.html">立即登录</a>
                </p>
            </div>
        </div>
    </main>
    <footer class="auth-page-footer">
        <div class="auth-page-footer-inner">
            <span>© 2026 杭州巨猿科技有限公司</span>
            <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">浙ICP备2026010267号-1</a>
            <a href="https://beian.mps.gov.cn/#/query/webSearch?code=33010802014468" rel="noreferrer" target="_blank" class="tm-beian-link">
                <img src="./assets/img/ghs.png" width="16" height="16" alt="公安备案图标">
                <span>浙公网安备33010802014468号</span>
            </a>
        </div>
    </footer>
    <script src="./assets/js/main-app.js"></script>
    <script src="./assets/js/tm-ui-loader.js"></script>
    <script src="./assets/js/legal-agreements.js?v=20260518"></script>
    <script src="./assets/js/auth.js?v=20260619ui3"></script>
    <script>
        function tmRegisterTogglePwd(inputId, btn) {
            var input = document.getElementById(inputId);
            if (!input || !btn) return;
            var ic = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                btn.setAttribute('aria-label', '隐藏密码');
                if (ic) { ic.classList.remove('ph-eye'); ic.classList.add('ph-eye-slash'); }
            } else {
                input.type = 'password';
                btn.setAttribute('aria-label', '显示密码');
                if (ic) { ic.classList.remove('ph-eye-slash'); ic.classList.add('ph-eye'); }
            }
        }
        document.addEventListener('DOMContentLoaded', function() {
            document.documentElement.setAttribute('data-merchant-type', 'WHOLESALE');
            try { sessionStorage.setItem('tm_merchant_intent', 'WHOLESALE'); } catch (e) { /* ignore */ }
            try {
                var params = new URLSearchParams(window.location.search);
                var ref = params.get('ref');
                if (ref) {
                    var ic = document.getElementById('inviteCode');
                    if (ic) ic.value = ref.trim();
                }
            } catch (eRef) { /* ignore */ }
        });
    </script>
</body>
</html>
