<!-- 推荐奖励弹窗：由 auth.js injectMemberAuxModals 注入 -->
<div id="referral-rewards-modal" class="hidden fixed inset-0 z-[105] flex items-end md:items-center justify-center p-0 md:p-6">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-[2px]" onclick="closeReferralListModal()"></div>
    <div class="relative bg-white w-full md:max-w-2xl md:rounded-[2.5rem] rounded-t-[2.5rem] shadow-2xl max-h-[92vh] flex flex-col overflow-hidden border border-slate-100/80">
        <header class="px-5 md:px-8 py-4 border-b border-slate-100 bg-white/90 backdrop-blur-xl shrink-0 flex items-start justify-between gap-3">
            <div class="min-w-0">
                <p class="text-[9px] font-black text-[#14B8A6] uppercase tracking-widest">Referral Rewards</p>
                <h3 class="text-base md:text-lg font-black text-slate-900 mt-0.5">推荐奖励</h3>
                <p class="text-[10px] text-slate-400 mt-1">有效推荐 <span id="referral-modal-qualified" class="text-[#14B8A6] font-black">0</span> 人 · 名单已脱敏</p>
            </div>
            <button type="button" onclick="closeReferralListModal()" class="min-h-[40px] min-w-[40px] flex items-center justify-center rounded-full hover:bg-slate-100 shrink-0" aria-label="关闭"><i class="ph ph-x text-xl text-slate-500"></i></button>
        </header>
        <div class="flex-1 overflow-y-auto p-4 md:p-6 pb-safe space-y-5 md:space-y-6">
            <div class="member-referral-hero rounded-[2rem] md:rounded-[2.5rem] p-5 md:p-6 relative overflow-hidden border border-teal-100/80 bg-gradient-to-br from-teal-50/95 via-white/90 to-emerald-50/80 backdrop-blur-xl shadow-sm">
                <div class="absolute -right-6 -top-6 w-32 h-32 rounded-full bg-[#14B8A6]/15 blur-2xl pointer-events-none"></div>
                <div class="relative z-10 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                    <div>
                        <p class="text-[9px] font-black text-[#14B8A6] uppercase tracking-widest">Referral Rewards</p>
                        <h3 class="text-lg font-black text-slate-900 mt-1">推荐奖励中心</h3>
                        <p class="text-[11px] text-slate-600 mt-1 leading-relaxed">邀请好友完成首笔付费订阅，即可获得返现奖励</p>
                    </div>
                    <div class="flex gap-3 shrink-0">
                        <div class="member-ref-stat-pill rounded-2xl bg-white/80 backdrop-blur-md border border-teal-100 px-4 py-3 text-center min-w-[88px] shadow-sm">
                            <p class="text-[9px] font-bold text-slate-400 uppercase">有效推荐</p>
                            <p id="member-ref-stat-qualified" class="text-2xl font-black text-[#14B8A6] leading-tight">0</p>
                        </div>
                        <div class="member-ref-stat-pill rounded-2xl bg-white/80 backdrop-blur-md border border-slate-100 px-4 py-3 text-center min-w-[88px] shadow-sm">
                            <p class="text-[9px] font-bold text-slate-400 uppercase">累计邀请</p>
                            <p id="member-ref-stat-total" class="text-2xl font-black text-slate-800 leading-tight">0</p>
                        </div>
                    </div>
                </div>
                <div class="relative z-10 mt-4 flex flex-wrap items-center gap-2 text-[10px]">
                    <span class="text-slate-500">我的推荐码</span>
                    <span id="member-referral-tab-code" class="font-mono font-black text-teal-800 bg-white/70 px-2.5 py-1 rounded-lg border border-teal-100">—</span>
                    <button type="button" onclick="showPoster()" class="ml-auto px-3 py-1.5 rounded-xl bg-[#14B8A6] text-white text-[10px] font-black hover:bg-[#0D9488] transition">生成海报</button>
                </div>
            </div>

            <section class="rounded-[2rem] md:rounded-[2.5rem] border border-slate-100 bg-white/90 backdrop-blur-xl shadow-sm overflow-hidden">
                <div class="px-4 md:px-6 py-4 border-b border-slate-100 flex items-center justify-between gap-2">
                    <h4 class="text-sm font-black text-slate-800 flex items-center gap-2"><i class="ph ph-list-checks text-[#14B8A6]"></i> 推荐名单</h4>
                    <span class="text-[10px] text-slate-400">被推荐方已脱敏展示</span>
                </div>
                <div class="hidden md:block overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-slate-50/80 text-slate-400 font-bold">
                            <tr>
                                <th class="px-6 py-3">被推荐人</th>
                                <th class="px-4 py-3">注册时间</th>
                                <th class="px-6 py-3 text-right">有效推荐</th>
                            </tr>
                        </thead>
                        <tbody id="member-referral-list-tbody" class="divide-y divide-slate-100 text-slate-700"></tbody>
                    </table>
                </div>
                <div id="member-referral-list-cards" class="md:hidden divide-y divide-slate-100"></div>
                <p id="member-referral-list-empty" class="hidden text-center text-slate-400 text-xs py-12">暂无推荐记录，分享推荐码邀请好友注册吧</p>
            </section>

            <section class="rounded-[2rem] md:rounded-[2.5rem] border border-slate-100 bg-white/90 backdrop-blur-xl shadow-sm overflow-hidden">
                <div class="px-4 md:px-6 py-4 border-b border-slate-100">
                    <h4 class="text-sm font-black text-slate-800 flex items-center gap-2"><i class="ph ph-wallet text-[#14B8A6]"></i> 提现收款信息</h4>
                    <p class="text-[10px] text-slate-400 mt-1">用于推荐返现结算，信息保存至您的账户</p>
                </div>
                <div class="p-4 md:p-6 space-y-4">
                    <div id="member-payee-saved" class="hidden rounded-2xl border border-teal-100 bg-teal-50/50 p-4">
                        <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3">
                            <div class="min-w-0 space-y-2 text-xs">
                                <p class="text-[10px] font-black text-teal-700 uppercase tracking-widest">已保存收款账户</p>
                                <p><span class="text-slate-400">账户类型</span> <span id="member-payee-saved-type" class="font-bold text-slate-800 ml-1">—</span></p>
                                <p><span class="text-slate-400">户名</span> <span id="member-payee-saved-name" class="font-bold text-slate-800 ml-1">—</span></p>
                                <p><span class="text-slate-400">账号</span> <span id="member-payee-saved-no" class="font-mono font-bold text-slate-800 ml-1 break-all">—</span></p>
                                <p id="member-payee-saved-bank-row" class="hidden"><span class="text-slate-400">开户行</span> <span id="member-payee-saved-bank" class="font-bold text-slate-800 ml-1">—</span></p>
                                <p class="text-[9px] text-slate-400">更新于 <span id="member-payee-saved-at">—</span></p>
                            </div>
                            <button type="button" onclick="memberPayeeEnterEdit()" class="shrink-0 min-h-[44px] px-4 py-2.5 rounded-xl border-2 border-[#14B8A6] text-[#14B8A6] text-xs font-black hover:bg-teal-50 transition">修改</button>
                        </div>
                    </div>
                    <div id="member-payee-form-wrap" class="space-y-4">
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 uppercase block mb-2">账户类型</label>
                            <div class="grid grid-cols-3 gap-2" id="member-payee-type-group">
                                <button type="button" data-payee-type="wechat" onclick="memberPayeeSelectType('wechat')" class="member-payee-type-btn min-h-[44px] px-2 py-2.5 rounded-xl border-2 border-slate-200 text-[11px] font-black text-slate-600 hover:border-teal-200 transition flex flex-col items-center justify-center gap-1"><i class="ph ph-chat-circle text-lg"></i>微信</button>
                                <button type="button" data-payee-type="alipay" onclick="memberPayeeSelectType('alipay')" class="member-payee-type-btn min-h-[44px] px-2 py-2.5 rounded-xl border-2 border-slate-200 text-[11px] font-black text-slate-600 hover:border-teal-200 transition flex flex-col items-center justify-center gap-1"><i class="ph ph-qr-code text-lg"></i>支付宝</button>
                                <button type="button" data-payee-type="bank" onclick="memberPayeeSelectType('bank')" class="member-payee-type-btn min-h-[44px] px-2 py-2.5 rounded-xl border-2 border-slate-200 text-[11px] font-black text-slate-600 hover:border-teal-200 transition flex flex-col items-center justify-center gap-1"><i class="ph ph-bank text-lg"></i>银行卡</button>
                            </div>
                        </div>
                        <div id="member-payee-fields" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <div class="sm:col-span-2">
                                <label class="text-[9px] font-bold text-slate-400 uppercase block mb-1">收款户名</label>
                                <input type="text" id="member-payee-name" maxlength="32" placeholder="与账户一致的实名" class="form-input w-full min-h-[44px]" autocomplete="name" />
                            </div>
                            <div class="sm:col-span-2" id="member-payee-account-wrap">
                                <label class="text-[9px] font-bold text-slate-400 uppercase block mb-1" id="member-payee-account-label">收款账号</label>
                                <input type="text" id="member-payee-account" maxlength="64" placeholder="请输入账号" class="form-input w-full min-h-[44px] font-mono" autocomplete="off" />
                            </div>
                            <div id="member-payee-bank-fields" class="hidden sm:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                <div>
                                    <label class="text-[9px] font-bold text-slate-400 uppercase block mb-1">开户银行</label>
                                    <input type="text" id="member-payee-bank-name" maxlength="64" placeholder="如：中国工商银行" class="form-input w-full min-h-[44px]" />
                                </div>
                                <div>
                                    <label class="text-[9px] font-bold text-slate-400 uppercase block mb-1">开户支行</label>
                                    <input type="text" id="member-payee-bank-branch" maxlength="64" placeholder="如：杭州西湖支行" class="form-input w-full min-h-[44px]" />
                                </div>
                            </div>
                        </div>
                        <p id="member-payee-form-hint" class="text-[10px] text-slate-400 hidden"></p>
                        <div class="flex flex-col sm:flex-row gap-2">
                            <button type="button" id="member-payee-save-btn" onclick="memberPayeeSave()" class="flex-1 min-h-[44px] px-6 py-3 rounded-xl bg-[#14B8A6] text-white text-xs font-black shadow-lg shadow-[#14B8A6]/25 hover:bg-[#0D9488] transition active:scale-[0.98]">保存收款信息</button>
                            <button type="button" id="member-payee-cancel-btn" onclick="memberPayeeCancelEdit()" class="hidden sm:flex-none min-h-[44px] px-5 py-3 rounded-xl border-2 border-slate-200 text-slate-600 text-xs font-black hover:bg-slate-50 transition">取消</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
</div>
